apiVersion: apps/v1
kind: Deployment
metadata:
  name: complaint-service
  labels:
    app: complaint-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: complaint-service
  template:
    metadata:
      labels:
        app: complaint-service
        tier: backend
    spec:
      containers:
        - name: complaint-service
          image: complaint-service:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          env:
            - name: PORT
              value: "5000"
            - name: NODE_ENV
              value: "production"
            - name: AWS_REGION
              value: "ap-south-1"
            - name: DYNAMODB_TABLE
              value: "Complaints"
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
