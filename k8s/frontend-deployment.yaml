apiVersion: apps/v1
kind: Deployment
metadata:
  name: complaint-frontend
  labels:
    app: complaint-frontend
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: complaint-frontend
  template:
    metadata:
      labels:
        app: complaint-frontend
        tier: frontend
    spec:
      containers:
        - name: complaint-frontend
          image: complaint-frontend:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
