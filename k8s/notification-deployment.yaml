apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  labels:
    app: notification-service
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        tier: backend
    spec:
      containers:
        - name: notification-service
          image: notification-service:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 5001
              protocol: TCP
          envFrom:
            - secretRef:
                name: aws-credentials
                optional: true
          env:
            - name: PORT
              value: "5001"
            - name: NODE_ENV
              value: "production"
            - name: AWS_REGION
              value: "ap-south-1"
            - name: SES_FROM_EMAIL
              value: "yaswanthkumarpulapa@gmail.com"
            - name: ADMIN_EMAIL
              value: "yaswanthkumarpulapa@gmail.com"
            - name: NOTIFICATION_SECRET_NAME
              value: "complaint-management/notification"
            - name: USE_SECRETS_MANAGER
              value: "false"
            - name: SERVICE_NAME
              value: "notification-service"
            - name: STRUCTURED_LOGS
              value: "true"
          readinessProbe:
            httpGet:
              path: /
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
